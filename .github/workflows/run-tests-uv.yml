# This workflow runs the uv-backed Python test job separately from the main test matrix.

name: run tests uv

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build-uv:
    name: uv ${{ matrix.python-source }} Python (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-source: [managed, system]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: |
          requirements*.txt
          pyproject.toml

    - name: Create uv virtual environment with managed Python
      if: matrix.python-source == 'managed'
      run: uv venv --managed-python --python 3.14

    - name: Create uv virtual environment with system Python
      if: matrix.python-source == 'system'
      run: uv venv --no-managed-python --python python

    - name: Show Python and OpenSSL build info
      run: |
        uv run python -VV
        uv run python -c "import ssl, sys, sysconfig; print('sys.executable:', sys.executable); print('OPENSSL_VERSION:', ssl.OPENSSL_VERSION); print('OPENSSL_INCLUDES:', sysconfig.get_config_var('OPENSSL_INCLUDES')); print('LIBS:', sysconfig.get_config_var('LIBS')); print('LDFLAGS:', sysconfig.get_config_var('LDFLAGS'))"

    - name: Load kTLS kernel module
      if: runner.os == 'Linux'
      run: sudo modprobe tls

    - name: Install dependencies
      run: |
        uv pip install -r requirements.txt
        uv pip install -r requirements-test.txt

    - name: Compile Cython extensions
      run: uv run python setup.py build_ext --inplace

    - name: Show aiofastnet OpenSSL dynamic libraries
      if: matrix.python-source == 'system'
      run: uv run python -c "import aiofastnet; print('aiofastnet.OPENSSL_DYN_LIBS:', aiofastnet.OPENSSL_DYN_LIBS)"

    - name: Run test_echo
      run: uv run pytest -v tests/test_smoke.py::test_echo
