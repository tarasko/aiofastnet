# This workflow runs the uv-backed Python test job separately from the main test matrix.

name: run tests uv

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:

  build-uv:
    name: uv Python 3.14 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: |
          requirements*.txt
          pyproject.toml

    - name: Create uv virtual environment
      run: uv venv --python 3.14

    - name: Show Python and OpenSSL build info
      run: |
        uv run python -VV
        uv run python - <<'PY'
        import ssl
        import sys
        import sysconfig
        print("sys.executable:", sys.executable)
        print("OPENSSL_VERSION:", ssl.OPENSSL_VERSION)
        print("OPENSSL_INCLUDES:", sysconfig.get_config_var("OPENSSL_INCLUDES"))
        print("LIBS:", sysconfig.get_config_var("LIBS"))
        print("LDFLAGS:", sysconfig.get_config_var("LDFLAGS"))
        PY

    - name: Load kTLS kernel module
      if: runner.os == 'Linux'
      run: sudo modprobe tls

    - name: Install dependencies
      run: |
        uv pip install -r requirements.txt
        uv pip install -r requirements-test.txt

    - name: Compile Cython extensions
      run: uv run python setup.py build_ext --inplace

    - name: Run test_echo
      run: uv run pytest -v tests/test_basics.py::test_echo
